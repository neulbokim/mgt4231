{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SAINT 교내근로 근무시간표 조율</title>
  <link rel="stylesheet" as="style" crossorigin 
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
  <header class="saint-header">
    <div class="brand">
      <div class="crest">S</div>
      <div><strong>서강대학교</strong><span>SOGANG UNIVERSITY</span></div>
    </div>
    <nav>
      <a>학생정보</a><a>학적변동</a><a>수업/성적</a><a>등록/장학</a><a>학생신청</a><a>시설</a><a class="active">교내근로</a>
    </nav>
    <div id="userbar" class="userbar"></div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <h2>교내근로</h2>
      <button data-route="status">신청 현황</button>
      <button data-route="availability">근무 희망 입력</button>
      <button data-route="summary">근무 가능 시간 수합</button>
      <button data-route="requirements">부서 필요 인원 설정</button>
      <button data-route="generate">자동 시간표 생성</button>
      <button data-route="schedule">전체 근무시간표</button>
      <button data-route="student-slots">학생별 확인</button>
      <button data-route="my-schedule">나의 근무시간표</button>
    </aside>

    <section class="content">
      <div class="page-title">
        <h1 id="pageTitle">근무시간표 조율</h1>
        <div class="filters">
          <label>부서 <select id="departmentSelect"></select></label>
          <label>학기 <select id="termSelect"></select></label>
          <label>주차 <select id="weekSelect"></select></label>
          <label>학생 <select id="studentSelect"></select></label>
        </div>
      </div>

      <div id="message" class="message hidden"></div>
      <section id="view"></section>
    </section>
  </main>

  <script src="{% static 'js/api.js' %}"></script>
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
